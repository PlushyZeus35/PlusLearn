language: node_js
node_js:
  - 16.14.0
install:
  - npm install
script:
  - npm run test
branches:
  only:
    - main
    - staging
before_deploy:
  - rvm $(travis_internal_ruby) --fuzzy do ruby -S gem install faraday -v 1.8.0
deploy:
  provider: heroku
  api_key: api_key: 1f42c42f-8e4c-4713-b7e1-f491d3d32279
  app:
    main: pluslearn-production
    staging: pluslearn-staging